services:
  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: harvesteye_api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:harvesteye_pass@db:5432/harvesteye
      - MODEL_PATH=/app/models/classifier_int8.onnx
    volumes:
      - ./models:/app/models:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: harvesteye_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: harvesteye_pass
      POSTGRES_DB: harvesteye
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d harvesteye"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: harvesteye_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  db_data:
