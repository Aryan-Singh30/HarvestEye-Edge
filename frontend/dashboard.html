<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | HarvestEye-Edge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-leaf"></i> HarvestEye-Edge
            </a>
            <div class="nav-links">
                <a href="index.html">Scanner</a>
                <a href="dashboard.html" class="active">Dashboard</a>
                <a href="api-docs.html">API</a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 32px;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2>Scan History & Analytics</h2>
            <button class="btn btn-secondary" onclick="window.location.reload()"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
        </header>

        <!-- Stats Row -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px;">
            <div class="card" style="text-align: center;">
                <h4 style="color: var(--text-secondary); font-size: 0.875rem;">Total Scans</h4>
                <div id="statTotal" style="font-size: 2.5rem; font-weight: 700; color: var(--primary);">--</div>
            </div>
            <div class="card" style="text-align: center;">
                <h4 style="color: var(--text-secondary); font-size: 0.875rem;">Avg Latency (CPU)</h4>
                <div id="statLatency" style="font-size: 2.5rem; font-weight: 700; color: var(--primary);">--<span style="font-size: 1rem;">ms</span></div>
            </div>
            <div class="card" style="text-align: center;">
                <h4 style="color: var(--text-secondary); font-size: 0.875rem;">Most Common Defect</h4>
                <div id="statCommon" style="font-size: 1.5rem; font-weight: 700; color: var(--danger); margin-top: 10px;">--</div>
            </div>
        </div>

        <!-- History Table -->
        <div class="card">
            <h3 style="margin-bottom: 16px;">Recent Scans</h3>
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--border); color: var(--text-secondary);">
                            <th style="padding: 12px;">Timestamp (UTC)</th>
                            <th style="padding: 12px;">Defect Class</th>
                            <th style="padding: 12px;">Confidence</th>
                            <th style="padding: 12px;">Latency</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <tr><td colspan="4" style="text-align: center; padding: 20px;">Loading history...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
